<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="home-btn">← Back to Home</a>

    <header>
    <h1>🛒 My E-Commerce Store</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>

    <section class="products-container">

<div class="product-card">
    <h3>Gaming Laptop</h3>
    <img class="product-img" src="images/laptop.jpeg" alt="Laptop" width="250" height="250">
    <p>Intel i7 • 16GB RAM • 512GB SSD</p>
    <p class="price">₹50,000</p>
    <button>Add To Cart</button>
</div>

<div class="product-card">
    <h3>Smart Phone</h3>
    <img class="product-img" src="images/phones.jpeg" alt="Phone" width="250" height="250">
    <p>128GB Storage • 50MP Camera</p>
    <p class="price">₹25,000</p>
    <button>Add To Cart</button>
</div>

<div class="product-card">
    <h3>Wireless Headphones</h3>
    <img class="product-img" src="images/headphones.jpeg" alt="Headphones" width="250" height="250">
    <p>Noise Cancellation • Bluetooth 5.3</p>
    <p class="price">₹2,000</p>
    <button>Add To Cart</button>
</div>

<div class="product-card">
    <h3>Running Shoes</h3>
    <img class="product-img" src="images/shoes.jpeg" alt="Shoes" width="250" height="250">
    <p>Lightweight • Sports Edition</p>
    <p class="price">₹3,500</p>
    <button>Add To Cart</button>
</div>

    </section>

</body>
</html>
