<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<a href="index.html" class="home-btn">← Back to Home</a>

<div class="auth-wrapper">

    <div class="auth-card">
        <h2>Welcome Back 👋</h2>
        <p class="subtitle">Login to continue shopping</p>

        <form id="loginForm">
    <div class="input-group">
        <label>Email</label>
        <input
            type="email"
            id="loginEmail"
            placeholder="Enter your email"
            required
        >
    </div>

    <div class="input-group">
        <label>Password</label>
        <input
            type="password"
            id="loginPassword"
            placeholder="Enter your password"
            required
        >
    </div>
    <div class="forget-password">
        <a href="forget.html">Forgot Password?</a>
    </div>

    <button type="submit">Login</button>
</form>

        <p class="switch-text">
            Don't have an account?
            <a href="register.html">Create one</a>
        </p>
    </div>

</div>

</body>
</html>
